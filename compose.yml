version: "3.9"

services:
  devopsdb:
    image: pramodcg32/auto:db
    ports:
      - "3306:3306"
    deploy:
      replicas: 3
    networks:
      - mynetwork

  application:
    image: pramodcg32/auto:app
    ports:
      - "2222:8080"
    deploy:
      replicas: 3
    depends_on:
      - devopsdb
    networks:
      - mynetwork

networks:
  mynetwork:
    driver: overlay
